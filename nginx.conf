server {
    listen 80;
    server_name localhost;

    # Frontend (Vite/React Build)
    location / {
        root "C:/Users/User-1.DESKTOP-7I5UC2H/Desktop/ERPS - Copy/frontend/dist";
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Backend API (Django)
    location /api/ {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django Admin
    location /admin/ {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django Static Files (if collected via collectstatic)
    location /static/ {
        alias "C:/Users/User-1.DESKTOP-7I5UC2H/Desktop/ERPS - Copy/static/";
    }

    # Django Media Files
    location /media/ {
        alias "C:/Users/User-1.DESKTOP-7I5UC2H/Desktop/ERPS - Copy/media/";
    }
}
